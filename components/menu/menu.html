<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="/styles/global.css">

</head>

<body>

        <h3 class="header-menu">Borahae Bangtan</h3>

        <nav class="nav">

            <ul class="nav-list">
                <li><a href="/Home.html">Home</a></li>
                <li><a href="/pages/about.html">About BTS</a></li>
                <li><a href="/pages/members.html">Members</a></li>
                <li><a href="/pages/albuns.html">Albums</a></li>
                <li><a href="/pages/army.html">ARMY Community</a></li>
                <li class="dropdown">
                    <a href="#" class="translate-btn">

                    <ul class="dropdown-menu">
                        <li><a href="#">Portuguese</a></li>
                        <li><a href="#">Korean</a></li>
                    </ul>
                </li>
            </ul>
        </nav>
    </header>


    <style>

        .stars {
            position: relative;
            top: -53%;
            left: -28rem;
        }

        .menu-star1,
        .menu-star2 {
            width: 3rem;
            height: 2rem;
            z-index: 2;
            animation: glow 2s infinite alternate;
        }

        .menu-star1 {
            position: relative;
            left: -228px;
            top: 38px;
        }

        .menu-star2 {
            position: relative;
            left: 228px;
            top: 61px;
        }

        header {
            overflow: visible;
            position: relative;
            height: 13vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #7107911b;
            backdrop-filter: blur(7px);
            padding: 11px;
        }

        .header-menu {
            position: relative;
            top: -53%;
            left: -28rem;
            font-family: var(--font-cover);
            font-size: 2rem;
            color: var(--color1);
            text-shadow: 0 0 16px rgba(213, 149, 255, 0.644), 0 0 8px rgba(224, 167, 252, 0.374);
            z-index: 1;
            letter-spacing: 0.2rem;
        }

        /*button {
            font-family: var(--font-text);
            font-size: 1rem;
            color: rgb(0, 0, 0);
            font: bold;
            background: none;
            border: none;
            cursor: pointer;
        }*/

        .logo {
            position: relative;
            display: flex;
            top: 44%;
            left: -43%;
            width: 10%;
            height: 64%;
            z-index: 2;
            filter: invert(39%) sepia(99%) saturate(663%) hue-rotate(226deg) drop-shadow(0 5px 10px rgba(88, 13, 137, 0.747)) drop-shadow(0 0 5px rgba(248, 239, 255, 0.582));
        }

        .nav {
            position: absolute;
            margin-top: 0%;
            display: flex;
            justify-content: flex-end;
            width: 76%;
            padding-right: 30px;
           
        }

        .nav-list {
            display: flex;
            gap: 32px;
            list-style: none;
            z-index: 2;
        }

        .nav-list a {
            color: white;
            font-family: var(--font-text);
            margin: 0 13px;
            text-decoration: none;
            font-weight: bold;
            font-size: 132%;
            position: relative;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: var(--color1);
        }

        nav a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(to right, var(--color2), var(--color3), var(--color4));
            opacity: 0;
            transform: scaleX(0);
            transform-origin: center;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        nav a:hover::after {
            opacity: 1;
            transform: scaleX(1);
        }

        .hamburger {
            display: none;
            border: none;
            background: none;
            border-top: 3px solid #fff;
            cursor: pointer;
        }

        .hamburger::after,
        .hamburger::before {
            content: " ";
            display: block;
            width: 30px;
            height: 3px;
            background: #fff;
            margin-top: 5px;
            position: relative;
            transition: 0.3s;
        }

        /* Dropdown escondido */
        .dropdown {
            position: absolute;
            top: -9px;
            left: 90rem;
        }

        .dropdown-menu {
            display: none;
            position: absolute;

            background-color: #4507914d;
            backdrop-filter: blur(10px);
            border-radius: 1rem;
            list-style: none;
            padding: 0;
            margin: 0;
            min-width: 150px;
        }

        .dropdown-menu li a {
            padding: 10px;
        }

        /* Mostrar dropdown ao passar o rato */
        .dropdown:hover .dropdown-menu {
            display: block;
        }

        .translate-btn {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .translate-btn svg {
            width: 34px;
            height: 49px;
            fill: #d38cf8;
            animation: gira 4s linear infinite;
        }

        @keyframes gira {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }
    </style>


    <script src="/components/menu/menu.js" defer></script>
</body>

</html>
